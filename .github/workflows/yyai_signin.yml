name: 边界AI每日签到

on:
  schedule:
    # 每天北京时间 00:06 执行（UTC 16:06）
    - cron: '6 16 * * *'
  workflow_dispatch:

jobs:
  signin:
    name: 边界AI签到
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 配置 Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: 安装依赖
        run: npm install

      - name: 执行边界AI签到
        env:
          YYAI_TOKEN: ${{ secrets.YYAI_TOKEN }}
          YYAI_ACCESS_TOKEN: ${{ secrets.YYAI_ACCESS_TOKEN }}
          YYAI_UID: ${{ secrets.YYAI_UID }}
          QQ_MAIL_USER: ${{ secrets.QQ_MAIL_USER }}
          QQ_MAIL_PASS: ${{ secrets.QQ_MAIL_PASS }}
        run: node src/tasks/yyai_signin.js
