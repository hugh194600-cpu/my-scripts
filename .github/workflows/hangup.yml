name: B站弹幕宠物挂机

on:
  schedule:
    # 省额度版：每天两次（北京时间 08:00 / 20:00）
    - cron: '0 0,12 * * *'

  workflow_dispatch:
    inputs:
      cycle_minutes:
        description: '每轮间隔（分钟），默认 10'
        required: false
        default: '10'
      max_runtime_minutes:
        description: '最大运行时长（分钟），默认 25'
        required: false
        default: '25'


jobs:
  hangup:
    name: 弹幕宠物挂机
    runs-on: ubuntu-latest
    timeout-minutes: 40


    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 配置 Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: 安装依赖
        run: npm install --no-audit --no-fund

      - name: 执行挂机
        env:
          BILIBILI_COOKIE: ${{ secrets.BILIBILI_COOKIE }}
          BILIBILI_UID: ${{ secrets.BILIBILI_UID }}
          HANGUP_ROOM_ID: ${{ secrets.HANGUP_ROOM_ID }}
          QQ_MAIL_USER: ${{ secrets.QQ_MAIL_USER }}
          QQ_MAIL_PASS: ${{ secrets.QQ_MAIL_PASS }}
          YYAI_TOKEN: ${{ secrets.YYAI_TOKEN }}
          YYAI_ACCESS_TOKEN: ${{ secrets.YYAI_ACCESS_TOKEN }}
          YYAI_UID: ${{ secrets.YYAI_UID }}
          CYCLE_MINUTES: ${{ github.event.inputs.cycle_minutes || '10' }}
          MAX_RUNTIME_MINUTES: ${{ github.event.inputs.max_runtime_minutes || '25' }}
        run: node src/index.js
