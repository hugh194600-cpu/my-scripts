name: B站弹幕宠物挂机

on:
  schedule:
    # 每小时整点触发（公开仓库不限分钟数）
    # 每次运行55分钟，间隔5分钟后下一轮启动，实现24小时不间断
    - cron: '0 * * * *'

  workflow_dispatch:
    inputs:
      cycle_minutes:
        description: '每轮间隔（分钟），默认 6'
        required: false
        default: '6'
      max_runtime_minutes:
        description: '最大运行时长（分钟），默认 55'
        required: false
        default: '55'

# 并发控制：同一时间只允许一个挂机运行，新触发不会取消旧运行
concurrency:
  group: hangup-single
  cancel-in-progress: false

permissions:
  actions: write

jobs:
  hangup:
    name: 弹幕宠物挂机
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 配置 Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: 安装依赖
        run: npm install --no-audit --no-fund

      - name: 执行挂机
        env:
          BILIBILI_COOKIE: ${{ secrets.BILIBILI_COOKIE }}
          BILIBILI_UID: ${{ secrets.BILIBILI_UID }}
          HANGUP_ROOM_ID: ${{ secrets.HANGUP_ROOM_ID }}
          QQ_MAIL_USER: ${{ secrets.QQ_MAIL_USER }}
          QQ_MAIL_PASS: ${{ secrets.QQ_MAIL_PASS }}
          YYAI_TOKEN: ${{ secrets.YYAI_TOKEN }}
          YYAI_ACCESS_TOKEN: ${{ secrets.YYAI_ACCESS_TOKEN }}
          YYAI_UID: ${{ secrets.YYAI_UID }}
          CYCLE_MINUTES: ${{ github.event.inputs.cycle_minutes || '6' }}
          MAX_RUNTIME_MINUTES: ${{ github.event.inputs.max_runtime_minutes || '55' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node src/index.js
