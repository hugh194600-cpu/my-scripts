name: B站弹幕宠物挂机修炼

on:
  schedule:
    # 每10分钟触发一次（北京时间，UTC+8）
    - cron: '*/10 * * * *'
  workflow_dispatch:
    inputs:
      task:
        description: '执行任务 (hangup)'
        required: false
        default: 'hangup'

jobs:
  hangup:
    name: 弹幕宠物挂机修炼
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 配置 Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: 安装依赖
        run: npm install

      - name: 执行挂机
        env:
          BILIBILI_COOKIE: ${{ secrets.BILIBILI_COOKIE }}
          BILIBILI_UID: ${{ secrets.BILIBILI_UID }}
          HANGUP_ROOM_ID: ${{ secrets.HANGUP_ROOM_ID }}
          PET_PRIORITY_ROOMS: ${{ secrets.PET_PRIORITY_ROOMS }}
          RANDOM_ROOMS: ${{ secrets.RANDOM_ROOMS }}
          QQ_MAIL_USER: ${{ secrets.QQ_MAIL_USER }}
          QQ_MAIL_PASS: ${{ secrets.QQ_MAIL_PASS }}
          TASK: hangup
        run: node src/index.js
