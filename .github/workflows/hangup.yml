name: B站直播挂机

on:
  schedule:
    # 每15分钟执行一次
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  hangup:
    name: 直播挂机
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 执行挂机
        env:
          BILIBILI_COOKIE: ${{ secrets.BILIBILI_COOKIE }}
          BILIBILI_UID: ${{ secrets.BILIBILI_UID }}
          HANGUP_ROOM_ID: ${{ secrets.HANGUP_ROOM_ID }}
          HANGUP_DURATION: ${{ secrets.HANGUP_DURATION }}
          TASK: hangup
        run: node src/index.js
