name: B站每日签到

on:
  schedule:
    # 每天北京时间 08:00 执行（UTC 00:00）
    - cron: '0 0 * * *'
    # 备用：北京时间 10:00（UTC 02:00），防止首次被跳过
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      debug:
        description: '是否开启调试模式'
        required: false
        default: 'false'

jobs:
  signin:
    name: 每日签到
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装依赖
        run: npm install

      - name: 执行签到
        env:
          BILIBILI_COOKIE: ${{ secrets.BILIBILI_COOKIE }}
          BILIBILI_UID: ${{ secrets.BILIBILI_UID }}
          QQ_MAIL_USER: ${{ secrets.QQ_MAIL_USER }}
          QQ_MAIL_PASS: ${{ secrets.QQ_MAIL_PASS }}
          TASK: signin
        run: node src/index.js
