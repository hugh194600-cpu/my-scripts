name: CodeBuddy 自动签到

on:
  # 定时触发（北京时间每天 00:03，对应 UTC 16:03）
  schedule:
    - cron: '3 16 * * *'

  # 支持手动触发
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 🚀 执行签到脚本
        env:
          # 强制 UTF-8 编码（解决 GitHub Actions 环境编码问题）
          PYTHONIOENCODING: utf-8

          # 单账号配置（取消注释并配置 Secrets）
          CODEBUDDY_COOKIE: ${{ secrets.CODEBUDDY_COOKIE }}
          CODEBUDDY_USER_ID: ${{ secrets.CODEBUDDY_USER_ID }}

          # 多账号配置（JSON 格式，取消注释并配置 Secrets）
          # CODEBUDDY_ACCOUNTS: ${{ secrets.CODEBUDDY_ACCOUNTS }}
        run: |
          cd codebuddy-checkin && python codebuddy_checkin.py

      - name: 📊 签到结果通知（可选）
        if: always()
        run: |
          echo "签到任务执行完成"
          # 这里可以集成钉钉/企业微信/Telegram 通知
          # 示例：curl -X POST ${{ secrets.DINGTALK_WEBHOOK }} -d '...'
